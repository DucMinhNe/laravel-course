name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Lint all PHP files
        run: |
          find lessons topics -name "*.php" -print0 \
            | xargs -0 -n1 -P4 php -l
